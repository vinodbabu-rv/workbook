spring:
  application:
    name: iPamhe
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/testdb
    #url: jdbc:postgresql://postgres:5432/testdb
    username: postgres
    password: testdb
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  port: 8081